name: Task 3 - Deploy App to K8s

on:
  push:
    branches: [main, develop]
    tags: ['1.0.0']
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/1.0.0" ]]; then
            echo "APP_VERSION=1.0.0" >> $GITHUB_ENV
            echo "ENV_TYPE=release" >> $GITHUB_ENV
            echo "BRANCH_OR_TAG=1.0.0" >> $GITHUB_ENV
          else
            echo "APP_VERSION=dev" >> $GITHUB_ENV
            echo "ENV_TYPE=dev" >> $GITHUB_ENV
            echo "BRANCH_OR_TAG=develop" >> $GITHUB_ENV
          fi

      - name: Build and Push Docker Image
        run: |
          git clone --branch ${{ env.BRANCH_OR_TAG }} https://github.com/YulianSalo/devops-exam-pt2.git app_repo
          cd app_repo
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ env.APP_VERSION }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ env.APP_VERSION }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          APP_VERSION: ${{ env.APP_VERSION }}
          ENV_TYPE: ${{ env.ENV_TYPE }}
        run: |
          ansible-playbook -i task2/inventory.ini task3/deploy.yml \
            -e "docker_user=$DOCKER_USERNAME app_version=$APP_VERSION env_type=$ENV_TYPE" \
            --private-key ~/.ssh/id_rsa
