name: Task 3 - Full Deploy App to K8s

on:
  push:
    branches: [main, develop]
    tags: ['1.0.0']
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push BOTH Images
        run: |
          # 1. Збірка DEV версії з гілки develop
          git clone --branch develop https://github.com/YulianSalo/devops-exam-pt2.git app_dev
          cd app_dev
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:dev .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:dev
          cd ..

          # 2. Збірка Release версії з тегу 1.0.0
          git clone --branch 1.0.0 https://github.com/YulianSalo/devops-exam-pt2.git app_release
          cd app_release
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:1.0.0 .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:1.0.0

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Deploy DEV environment (Port 8002)
        run: |
          ansible-playbook -i task2/inventory.ini task3/deploy.yml \
            -e "target_host=${{ secrets.DROPLET_IP }} docker_user=${{ secrets.DOCKER_USERNAME }} app_version=dev env_type=dev" \
            --private-key ~/.ssh/id_rsa

      - name: Deploy RELEASE environment (Port 8003)
        run: |
          ansible-playbook -i task2/inventory.ini task3/deploy.yml \
            -e "target_host=${{ secrets.DROPLET_IP }} docker_user=${{ secrets.DOCKER_USERNAME }} app_version=1.0.0 env_type=release" \
            --private-key ~/.ssh/id_rsa
