- name: Deploy Application to Kubernetes with Namespaces
  hosts: all
  become: yes
  vars:
    # Визначаємо порт тут, щоб не плутати Ansible всередині shell
    app_port: "{{ '8002' if env_type == 'dev' else '8003' }}"
    unit_name: "k8s-proxy-{{ '8002' if env_type == 'dev' else '8003' }}.service"

  tasks:
    - name: Ensure Namespace exists for {{ env_type }}
      shell: kubectl create namespace {{ env_type }} || true

    - name: Create directory for manifests
      file:
        path: /root/task3/k8s
        state: directory
        mode: '0755'

    - name: Copy manifests to server
      copy:
        src: "k8s/{{ env_type }}.yaml"
        dest: "/root/task3/k8s/{{ env_type }}.yaml"

    - name: Update manifest with image
      shell: |
        sed -i "s|DOCKER_IMAGE_TAG|{{ docker_user }}/my-app:{{ app_version }}|g" /root/task3/k8s/{{ env_type }}.yaml

    - name: Apply manifest to namespace
      shell: kubectl apply -f /root/task3/k8s/{{ env_type }}.yaml -n {{ env_type }}

    - name: Open Firewall ports via code
      ufw:
        rule: allow
        port: "{{ app_port }}"
        proto: tcp

    - name: Setup Indestructible Port Forwarding via Systemd
      shell: |
        # 1. Очищення старої служби
        systemctl stop "{{ unit_name }}" || true
        systemctl reset-failed "{{ unit_name }}" || true
        rm -f /run/systemd/transient/"{{ unit_name }}" || true
        systemctl daemon-reload
        
        # 2. Запуск нової служби
        systemd-run --unit="k8s-proxy-{{ app_port }}" \
          --description="K8s Port Forward for {{ app_port }}" \
          /usr/bin/kubectl port-forward \
          --address 0.0.0.0 \
          service/service-{{ env_type }} {{ app_port }}:80 \
          -n {{ env_type }}
      args:
        executable: /bin/bash
