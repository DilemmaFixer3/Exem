- name: Deploy Application to Kubernetes with Namespaces
  hosts: all
  become: yes
  tasks:
    - name: Ensure Namespace exists for {{ env_type }}
      shell: kubectl create namespace {{ env_type }} || true

    - name: Create directory for manifests
      file:
        path: /root/task3/k8s
        state: directory
        mode: '0755'

    - name: Copy manifests to server
      copy:
        src: "k8s/{{ env_type }}.yaml"
        dest: "/root/task3/k8s/{{ env_type }}.yaml"

    - name: Update manifest with image
      shell: |
        sed -i "s|DOCKER_IMAGE_TAG|{{ docker_user }}/my-app:{{ app_version }}|g" /root/task3/k8s/{{ env_type }}.yaml

    - name: Apply manifest to namespace
      shell: kubectl apply -f /root/task3/k8s/{{ env_type }}.yaml -n {{ env_type }}

    - name: Open Firewall ports via code
      ufw:
        rule: allow
        port: "800{{ '2' if env_type == 'dev' else '3' }}"
        proto: tcp

    - name: Setup Indestructible Port Forwarding via Systemd
      shell: |
        PORT=800{{ '2' if env_type == 'dev' else '3' }}
        # Зупиняємо стару службу, якщо вона була
        systemctl stop "k8s-proxy-$PORT" || true
        
        # Запускаємо як транзієнтну системну службу
        systemd-run --unit="k8s-proxy-$PORT" \
          /usr/bin/kubectl port-forward \
          --address 0.0.0.0 \
          service/service-{{ env_type }} $PORT:80 \
          -n {{ env_type }}
      args:
        executable: /bin/bash
