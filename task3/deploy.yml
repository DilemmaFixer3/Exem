- name: Deploy Application to Kubernetes
  hosts: all
  become: yes
  tasks:
    - name: Ensure Namespace exists
      shell: kubectl create namespace {{ env_type }} || true

    - name: Create directory for manifests on server
      file:
        path: /root/task3/k8s
        state: directory
        mode: '0755'

    - name: Copy manifests from GitHub to Server
      copy:
        src: "k8s/{{ env_type }}.yaml"
        dest: "/root/task3/k8s/{{ env_type }}.yaml"

    - name: Update manifest with correct image
      shell: |
        sed -i "s|DOCKER_IMAGE_TAG|{{ docker_user }}/my-app:{{ app_version }}|g" /root/task3/k8s/{{ env_type }}.yaml

    - name: Apply Kubernetes manifest
      shell: kubectl apply -f /root/task3/k8s/{{ env_type }}.yaml

    - name: Setup Indestructible Port Forwarding
      shell: |
        PORT=800{{ '2' if env_type == 'dev' else '3' }}
        # 1. Видаляємо стару тимчасову службу, якщо вона була
        systemctl stop "k8s-proxy-$PORT" || true
        
        # 2. Запускаємо port-forward через systemd-run. 
        # Це зробить процес повністю незалежним від Ansible.
        systemd-run --unit="k8s-proxy-$PORT" \
          /usr/bin/kubectl port-forward \
          --address 0.0.0.0 \
          service/service-{{ env_type }} $PORT:80 \
          -n {{ env_type }}
      args:
        executable: /bin/bash
