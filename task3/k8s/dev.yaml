apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
      env: dev
  template:
    metadata:
      labels:
        app: my-app
        env: dev
    spec:
      containers:
      - name: app
        image: DOCKER_IMAGE_TAG
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: service-dev
spec:
  type: ClusterIP
  selector:
    app: my-app
    env: dev
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
